name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Test tag to run'
        required: true
        type: choice
        options:
          - all
          - '@critical'
          - '@high'
          - '@medium'

jobs:
  critical:
    name: Critical tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.tag == 'all' ||
      inputs.tag == '@critical'
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx playwright test --grep @critical
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-critical
          path: playwright-report/
          retention-days: 14

  high:
    name: High tests
    needs: critical
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.tag == 'all' ||
      inputs.tag == '@high'
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx playwright test --grep @high
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-high
          path: playwright-report/
          retention-days: 14

  medium:
    name: Medium tests
    needs: high
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    if: >
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && (inputs.tag == 'all' || inputs.tag == '@medium'))
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx playwright test --grep @medium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-medium
          path: playwright-report/
          retention-days: 14
